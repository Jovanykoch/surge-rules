name: Generate routing rules for Surge
permissions:
  contents: write
on:
  workflow_dispatch:
  schedule:
    - cron: "30 22 * * *"
  push:
    branches:
      - master
    paths-ignore:
      - "**/README.md"
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Set variables
        shell: bash
        run: |
          echo "RELEASE_NAME=Released on $(date +%Y%m%d%H%M)" >> "$GITHUB_ENV"
          echo "TAG_NAME=v$(date +%Y.%m.%d)-${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
          echo "custom_icloud=https://raw.githubusercontent.com/Loyalsoldier/domain-list-custom/release/icloud.txt" >> "$GITHUB_ENV"
          echo 'custom_tld_not_cn=https://raw.githubusercontent.com/Loyalsoldier/domain-list-custom/release/tld-!cn.txt' >> "$GITHUB_ENV"
          echo "custom_private=https://raw.githubusercontent.com/Loyalsoldier/domain-list-custom/release/private.txt" >> "$GITHUB_ENV"
          echo "custom_ai=https://raw.githubusercontent.com/Jovanykoch/surge-rules/master/rules/ai.txt" >> "$GITHUB_ENV"
          echo "custom_dev=https://raw.githubusercontent.com/Jovanykoch/surge-rules/master/rules/dev.txt" >> "$GITHUB_ENV"
          echo "custom_edu=https://raw.githubusercontent.com/Jovanykoch/surge-rules/master/rules/edu.txt" >> "$GITHUB_ENV"
          echo "Loyalsoldier_reject=https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/release/reject-list.txt" >> "$GITHUB_ENV"
          echo "Loyalsoldier_proxy=https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/release/proxy-list.txt" >> "$GITHUB_ENV"
          echo "Loyalsoldier_direct=https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/release/direct-list.txt" >> "$GITHUB_ENV"
          echo "Loyalsoldier_gfw=https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/release/gfw.txt" >> "$GITHUB_ENV"
          echo "Loyalsoldier_greatfire=https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/release/greatfire.txt" >> "$GITHUB_ENV"
          echo "felixonmars_apple=https://raw.githubusercontent.com/felixonmars/dnsmasq-china-list/master/apple.china.conf" >> "$GITHUB_ENV"
          echo "felixonmars_google=https://raw.githubusercontent.com/felixonmars/dnsmasq-china-list/master/google.china.conf" >> "$GITHUB_ENV"
          echo "cn_cidr=https://raw.githubusercontent.com/Loyalsoldier/geoip/release/text/cn.txt" >> "$GITHUB_ENV"
          echo "telegram_cidr=https://raw.githubusercontent.com/Loyalsoldier/geoip/release/text/telegram.txt" >> "$GITHUB_ENV"

      - name: Checkout the default branch
        uses: actions/checkout@v4

      - name: Generate rules files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ruleset

          curl -sSL "${custom_icloud}" -o /tmp/icloud.src
          awk -F ':' '/^full:/ {print $2}' /tmp/icloud.src > icloud.txt
          awk -F ':' '/^domain:/ {print "."$2}' /tmp/icloud.src >> icloud.txt
          awk -F ':' '/^full:/ {print "DOMAIN,"$2}' /tmp/icloud.src > ruleset/icloud.txt
          awk -F ':' '/^domain:/ {print "DOMAIN-SUFFIX,"$2}' /tmp/icloud.src >> ruleset/icloud.txt

          curl -sSL "${felixonmars_google}" -o /tmp/google.src
          awk -F '/' '/^server=\// {print "."$2}' /tmp/google.src > google.txt
          awk -F '/' '/^server=\// {print "DOMAIN-SUFFIX,"$2}' /tmp/google.src > ruleset/google.txt

          curl -sSL "${felixonmars_apple}" -o /tmp/apple.src
          awk -F '/' '/^server=\// {print "."$2}' /tmp/apple.src > apple.txt
          awk -F '/' '/^server=\// {print "DOMAIN-SUFFIX,"$2}' /tmp/apple.src > ruleset/apple.txt

          curl -sSL "${Loyalsoldier_direct}" -o /tmp/direct.src
          grep -Ev '^(regexp|keyword):' /tmp/direct.src | awk -F ':' '/^full:/ {print $2}' > direct.txt
          grep -Ev '^(regexp|keyword|full):' /tmp/direct.src | awk -F ':' '/^(domain:)?[-_a-zA-Z0-9.]+$/ {print "."$NF}' >> direct.txt
          grep -Ev '^(regexp|keyword):' /tmp/direct.src | awk -F ':' '/^full:/ {print "DOMAIN,"$2}' > ruleset/direct.txt
          grep -Ev '^(regexp|keyword|full):' /tmp/direct.src | awk -F ':' '/^(domain:)?[-_a-zA-Z0-9.]+$/ {print "DOMAIN-SUFFIX,"$NF}' >> ruleset/direct.txt

          curl -sSL "${Loyalsoldier_proxy}" -o /tmp/proxy.src
          grep -Ev '^(regexp|keyword):' /tmp/proxy.src | awk -F ':' '/^full:/ {print $2}' > proxy.txt
          grep -Ev '^(regexp|keyword|full):' /tmp/proxy.src | awk -F ':' '/^(domain:)?[-_a-zA-Z0-9.]+$/ {print "."$NF}' >> proxy.txt
          grep -Ev '^(regexp|keyword):' /tmp/proxy.src | awk -F ':' '/^full:/ {print "DOMAIN,"$2}' > ruleset/proxy.txt
          grep -Ev '^(regexp|keyword|full):' /tmp/proxy.src | awk -F ':' '/^(domain:)?[-_a-zA-Z0-9.]+$/ {print "DOMAIN-SUFFIX,"$NF}' >> ruleset/proxy.txt

          curl -sSL "${custom_ai}" > ai.txt
          awk 'NF && $1 !~ /^#/ {print "DOMAIN-SUFFIX,"$0}' ai.txt > ruleset/ai.txt

          curl -sSL "${custom_dev}" > dev.txt
          awk 'NF && $1 !~ /^#/ {print "DOMAIN-SUFFIX,"$0}' dev.txt > ruleset/dev.txt

          curl -sSL "${custom_edu}" > edu.txt
          awk 'NF && $1 !~ /^#/ {print "DOMAIN-SUFFIX,"$0}' edu.txt > ruleset/edu.txt

          curl -sSL "${Loyalsoldier_reject}" -o /tmp/reject.src
          grep -Ev '^(regexp|keyword):' /tmp/reject.src | awk -F ':' '/^(domain:|full:)?[-_a-zA-Z0-9.]+$/ {print "."$NF}' > reject.txt
          grep -Ev '^(regexp|keyword):' /tmp/reject.src | awk -F ':' '/^(domain:|full:)?[-_a-zA-Z0-9.]+$/ {print "DOMAIN-SUFFIX,"$NF}' > ruleset/reject.txt

          curl -sSL "${custom_private}" -o /tmp/private.src
          awk -F ':' '/^full:/ {print $2}' /tmp/private.src > private.txt
          awk -F ':' '/^domain:/ {print "."$2}' /tmp/private.src >> private.txt
          awk -F ':' '/^full:/ {print "DOMAIN,"$2}' /tmp/private.src > ruleset/private.txt
          awk -F ':' '/^domain:/ {print "DOMAIN-SUFFIX,"$2}' /tmp/private.src >> ruleset/private.txt

          curl -sSL "${Loyalsoldier_gfw}" -o /tmp/gfw.src
          grep -Ev '^(regexp|keyword):' /tmp/gfw.src | awk -F ':' '/^(domain:|full:)?[-_a-zA-Z0-9.]+$/ {print "."$NF}' > gfw.txt
          grep -Ev '^(regexp|keyword):' /tmp/gfw.src | awk -F ':' '/^(domain:|full:)?[-_a-zA-Z0-9.]+$/ {print "DOMAIN-SUFFIX,"$NF}' > ruleset/gfw.txt

          curl -sSL "${Loyalsoldier_greatfire}" -o /tmp/greatfire.src
          grep -Ev '^(regexp|keyword):' /tmp/greatfire.src | awk -F ':' '/^(domain:|full:)?[-_a-zA-Z0-9.]+$/ {print "."$NF}' > greatfire.txt
          grep -Ev '^(regexp|keyword):' /tmp/greatfire.src | awk -F ':' '/^(domain:|full:)?[-_a-zA-Z0-9.]+$/ {print "DOMAIN-SUFFIX,"$NF}' > ruleset/greatfire.txt

          curl -sSL "${custom_tld_not_cn}" -o /tmp/tld-not-cn.src
          awk -F ':' '/^domain:/ {print "."$2}' /tmp/tld-not-cn.src > tld-not-cn.txt
          awk -F ':' '/^domain:/ {print "DOMAIN-SUFFIX,"$2}' /tmp/tld-not-cn.src > ruleset/tld-not-cn.txt

          curl -sSL "${cn_cidr}" -o /tmp/cncidr.src
          awk '/^[0-9]+(\.[0-9]+){3}\/[0-9]+$/ {print "IP-CIDR,"$0} /^[0-9A-Fa-f:]+\/[0-9]+$/ {print "IP-CIDR6,"$0}' /tmp/cncidr.src > cncidr.txt
          cp cncidr.txt ruleset/cncidr.txt

          curl -sSL "${telegram_cidr}" -o /tmp/telegramcidr.src
          awk '/^[0-9]+(\.[0-9]+){3}\/[0-9]+$/ {print "IP-CIDR,"$0} /^[0-9A-Fa-f:]+\/[0-9]+$/ {print "IP-CIDR6,"$0}' /tmp/telegramcidr.src > telegramcidr.txt
          cp telegramcidr.txt ruleset/telegramcidr.txt

      - name: Check duplicate and conflict rules
        shell: bash
        run: |
          set -euo pipefail

          check_dup_file() {
            local file="$1"
            local dups
            dups=$(awk 'NF && $1 !~ /^#/ {c[$0]++} END {for (i in c) if (c[i] > 1) print i}' "$file")
            if [ -n "$dups" ]; then
              echo "Duplicate entries found in $file"
              echo "$dups"
              return 1
            fi
          }

          for f in *.txt ruleset/*.txt; do
            check_dup_file "$f"
          done

          normalize_custom() {
            awk 'NF && $1 !~ /^#/ {print tolower($0)}' "$1" | sort -u
          }

          printf '%s\n' \
            'github.com' \
            'githubusercontent.com' \
            'huggingface.co' \
            'replicate.com' \
            > /tmp/conflict-allowlist.txt

          normalize_custom rules/ai.txt > /tmp/ai.norm
          normalize_custom rules/dev.txt > /tmp/dev.norm
          normalize_custom rules/edu.txt > /tmp/edu.norm

          compare_conflict() {
            local left="$1"
            local right="$2"
            local left_name="$3"
            local right_name="$4"
            local overlap
            overlap=$(comm -12 "$left" "$right" | grep -vxFf /tmp/conflict-allowlist.txt || true)
            if [ -n "$overlap" ]; then
              echo "Conflict entries between $left_name and $right_name"
              echo "$overlap" | head -n 20
              return 1
            fi
          }

          compare_conflict /tmp/ai.norm /tmp/dev.norm ai dev
          compare_conflict /tmp/ai.norm /tmp/edu.norm ai edu
          compare_conflict /tmp/dev.norm /tmp/edu.norm dev edu

      - name: Move files to publish directory
        shell: bash
        run: |
          mkdir -p publish
          cp *.txt ./publish/
          mv ruleset ./publish/

      - name: Update README statistics
        shell: bash
        run: |
          set -euo pipefail

          stats_file=/tmp/readme-stats.md
          {
            echo '<!-- STATS:START -->'
            echo '## 规则统计（自动生成）'
            echo
            echo '### DOMAIN-SET'
            echo
            echo '| 文件 | 条目数 |'
            echo '| --- | ---: |'
            for file in publish/*.txt; do
              base=$(basename "$file")
              count=$(awk 'NF && $1 !~ /^#/' "$file" | wc -l | awk '{print $1}')
              echo "| \\`$base\\` | $count |"
            done
            echo
            echo '### RULE-SET'
            echo
            echo '| 文件 | 条目数 |'
            echo '| --- | ---: |'
            for file in publish/ruleset/*.txt; do
              base=$(basename "$file")
              count=$(awk 'NF && $1 !~ /^#/' "$file" | wc -l | awk '{print $1}')
              echo "| \\`$base\\` | $count |"
            done
            echo '<!-- STATS:END -->'
          } > "$stats_file"

          if grep -q '<!-- STATS:START -->' README.md && grep -q '<!-- STATS:END -->' README.md; then
            awk -v replacement="$stats_file" '
              BEGIN { inblock=0 }
              /<!-- STATS:START -->/ {
                inblock=1
                while ((getline line < replacement) > 0) print line
                close(replacement)
                next
              }
              /<!-- STATS:END -->/ {
                inblock=0
                next
              }
              inblock == 0 { print }
            ' README.md > /tmp/README.md.new
          else
            cat README.md > /tmp/README.md.new
            echo >> /tmp/README.md.new
            cat "$stats_file" >> /tmp/README.md.new
          fi

          mv /tmp/README.md.new README.md

      - name: Commit README statistics
        shell: bash
        run: |
          set -euo pipefail
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet README.md; then
            echo "README is up to date"
          else
            git add README.md
            git commit -m "chore: update README stats"
            git pull --rebase --autostash origin master
            git push origin HEAD:master
          fi

      - name: Create release and upload assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${TAG_NAME}" ./publish/* --title "${RELEASE_NAME}" --notes "Automated release ${TAG_NAME}"

      - name: Git push assets to "release" branch
        shell: bash
        run: |
          cd publish || exit 1
          git init
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b release
          git add .
          git commit -m "${{ env.RELEASE_NAME }}"
          git remote add origin "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push -f -u origin release

      - name: Purge jsdelivr CDN
        shell: bash
        run: |
          cd publish || exit 1
          for file in $(ls); do
            curl -i "https://purge.jsdelivr.net/gh/${{ github.repository }}@release/${file}"
          done
          for file in $(ls ruleset); do
            curl -i "https://purge.jsdelivr.net/gh/${{ github.repository }}@release/ruleset/${file}"
          done
