<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Surge Rules</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        line-height: 1.5;
        background: #f7f7f8;
        color: #1f2937;
      }
      .container {
        max-width: 720px;
        margin: 0 auto;
        padding: 24px 16px 40px;
      }
      .card {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 20px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.75rem;
      }
      p {
        margin: 0 0 16px;
      }
      ul {
        margin: 0 0 20px;
        padding-left: 20px;
      }
      li + li {
        margin-top: 8px;
      }
      a {
        color: #2563eb;
        text-decoration: none;
      }
      a:hover,
      a:focus {
        text-decoration: underline;
      }
      @media (max-width: 480px) {
        .container {
          padding: 16px 12px 28px;
        }
        .card {
          padding: 16px;
        }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="card">
        <h1>Surge Rules</h1>
        <p>A collection of custom Surge domain rule files for AI, development, and education services.</p>

        <h2>Available Rule Files</h2>
        <ul>
          <li><a href="./rules/ai.txt">ai.txt</a></li>
          <li><a href="./rules/dev.txt">dev.txt</a></li>
          <li><a href="./rules/edu.txt">edu.txt</a></li>
        </ul>

        <p>
          GitHub Repository:
          <a href="https://github.com/Jovanykoch/surge-rules">Jovanykoch/surge-rules</a>
        </p>
      </section>
    </main>
  </body>
</html>
